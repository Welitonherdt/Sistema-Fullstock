spring:
  application:
    name: fullstock-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${FULLSTOCK_DB_HOST:localhost}:${FULLSTOCK_DB_PORT:5433}/${FULLSTOCK_DB_NAME:fullstock}}
    username: ${SPRING_DATASOURCE_USERNAME:${FULLSTOCK_DB_USER:fullstock}}
    password: ${SPRING_DATASOURCE_PASSWORD:${FULLSTOCK_DB_PASSWORD:fullstock123}}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: ${FULLSTOCK_JWT_SECRET:fullstock-dev-secret-change-this-with-at-least-32-characters}
    expiration-hours: 12
